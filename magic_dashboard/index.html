    .leaflet-control-attribution a{color:#475569!important}
    .leaflet-popup-content-wrapper{background:#0d1b2a;border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
    .leaflet-popup-tip{background:#0d1b2a}
    .leaflet-popup-close-button{color:#64748b!important;font-size:16px!important}

    /* Pulse animation for user location */
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
    .user-pin{animation:pulse 2s ease-in-out infinite}

    /* Card hover */
    .ski-card{transition:transform .15s,box-shadow .15s}
    .ski-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5)!important}

    /* Tab indicator */
    .tab-active{position:relative}
    .tab-active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:2px}

    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .fade-in{animation:fadeIn .25s ease forwards}

    @media(max-width:767px){
      .sidebar-desktop{display:none!important}
    }
    @media(min-width:768px){

function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function weatherIcon(code){
  if(code===0)return"☀️";
  if(code<=2)return"🌤️";
  if(code<=3)return"☁️";
  if(code<=48)return"🌫️";
  if(code<=57)return"🌦️";
  if(code<=67)return"🌧️";
  if(code<=77)return"❄️";
  if(code<=82)return"🌧️";
  if(code<=86)return"🌨️";
  return"⛈️";
}

function RangeInput({min,max,value,onChange,label,unit}){

  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,isNaN(v)?lo:v));
  const pct=(v)=>((v-min)/(max-min))*100;
  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"monospace",marginBottom:8}}>{label}</div>

        </div>
      </div>
      <div style={{position:"relative",height:18,display:"flex",alignItems:"center"}}>

        <div style={{position:"absolute",left:`${pct(value[0])}%`,right:`${100-pct(value[1])}%`,height:3,background:"linear-gradient(90deg,#38bdf8,#818cf8)",borderRadius:2}}/>
        <input type="range" min={min} max={max} value={value[0]} onChange={e=>onChange([Math.min(+e.target.value,value[1]-1),value[1]])} style={{position:"absolute",width:"100%",opacity:0,cursor:"pointer",height:18,zIndex:2}}/>

function MapView({stations,userCoords,favorites,onToggleFav,weather,distances}){
  const mapRef=useRef(null);
  const mapInstanceRef=useRef(null);
  const markersRef=useRef([]);

  useEffect(()=>{
    if(mapInstanceRef.current)return;
    const map=L.map(mapRef.current,{center:[46.5,8.0],zoom:7,zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    mapInstanceRef.current=map;
    return()=>{map.remove();mapInstanceRef.current=null;};
  },[]);

  // Update markers when stations/favorites/weather/distances change
  useEffect(()=>{
    const map=mapInstanceRef.current;
    if(!map)return;
    markersRef.current.forEach(m=>map.removeLayer(m));
    markersRef.current=[];

    stations.forEach(s=>{
      const open=s.status==="offen";
      const isFav=favorites.includes(s.id);

        iconSize:[size,size],iconAnchor:[size/2,size/2],

        ?`<span style="padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;background:rgba(99,102,241,0.18);color:#a5b4fc;border:1px solid rgba(99,102,241,0.35)">✦ MagicPass</span>`

        <div style="font-family:'Syne',sans-serif;min-width:200px;padding:4px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
            <strong style="font-size:14px;color:#f1f5f9;line-height:1.3">${s.name}</strong>
            <span style="padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;white-space:nowrap;background:${open?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)"};color:${open?"#22c55e":"#ef4444"};border:1px solid ${open?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}">
              ${open?"● OFFEN":"○ ZU"}
            </span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
            <span style="font-size:10px;color:#64748b">${s.region}</span>
            ${mpBadge}
          </div>
          ${wHtml}${dHtml}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px">
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 7px;grid-column:1/-1">
              <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">🎿 Offene Pisten</div>
              <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace">${OPEN_DATA[s.id]?OPEN_DATA[s.id][0]:s.status==="offen"?Math.round(s.pistenKm*0.75):0} <span style="color:#475569;font-weight:400">/ ${s.pistenKm} km</span></div>
              <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px"><div style="height:100%;width:${s.pistenKm>0?Math.round(((OPEN_DATA[s.id]?OPEN_DATA[s.id][0]:s.status==="offen"?Math.round(s.pistenKm*0.75):0)/s.pistenKm)*100):0}%;background:#22c55e;border-radius:2px"></div></div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 7px;grid-column:1/-1">
              <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">🚡 Offene Lifte</div>
              <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace">${OPEN_DATA[s.id]?OPEN_DATA[s.id][1]:s.status==="offen"?Math.round(s.lifte*0.75):0} <span style="color:#475569;font-weight:400">/ ${s.lifte}</span></div>
              <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px"><div style="height:100%;width:${s.lifte>0?Math.round(((OPEN_DATA[s.id]?OPEN_DATA[s.id][1]:s.status==="offen"?Math.round(s.lifte*0.75):0)/s.lifte)*100):0}%;background:#38bdf8;border-radius:2px"></div></div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 7px">
              <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace">▲${s.bergHoehe}m</div>
              <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em">Gipfel</div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:5px 7px">
              <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace">▼${s.talHoehe}m</div>
              <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em">Tal</div>
            </div>
          </div>
          <button onclick="window._toggleFav(${s.id})" style="margin-top:8px;width:100%;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:${isFav?"#fbbf24":"#94a3b8"};cursor:pointer;font-size:11px;font-family:monospace">
            ${isFav?"⭐ Favorit entfernen":"☆ Als Favorit speichern"}
          </button>
        </div>
      `,{maxWidth:260});
      markersRef.current.push(marker);
    });

    // User location marker
    if(userCoords){
      const userIcon=L.divIcon({
        className:"",
        html:`<div class="user-pin" style="width:14px;height:14px;border-radius:50%;background:#38bdf8;border:2px solid white;box-shadow:0 0 12px #38bdf8"></div>`,
        iconSize:[14,14],iconAnchor:[7,7],
      });
      const um=L.marker([userCoords.lat,userCoords.lng],{icon:userIcon,zIndexOffset:1000}).addTo(map);
      um.bindPopup(`<div style="font-family:'Syne',sans-serif;padding:4px"><strong style="color:#38bdf8">📍 Dein Standort</strong></div>`);
      markersRef.current.push(um);
    }
  },[stations,favorites,weather,distances,userCoords]);

  // expose fav toggle to popup buttons
  useEffect(()=>{window._toggleFav=onToggleFav;},[onToggleFav]);

  return(
    <div style={{position:"relative",height:"100%"}}>
      <div ref={mapRef} style={{width:"100%",height:"100%",borderRadius:0}}/>
      {/* Legend */}
      <div style={{position:"absolute",bottom:24,left:16,zIndex:1000,background:"rgba(13,27,42,0.92)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 14px",backdropFilter:"blur(8px)"}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7,fontFamily:"monospace"}}>Legende</div>
        {[["#22c55e","50%","Offen"],["#ef4444","50%","Geschlossen"],["#38bdf8","50%","Dein Standort"],["#22c55e","4px","Im MagicPass"],["#64748b","50%","Kein MagicPass"]].map(([c,r,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
            <div style={{width:9,height:9,borderRadius:r,background:c,boxShadow:`0 0 4px ${c}`,border:r==="4px"?"2px solid rgba(165,180,252,0.6)":"none"}}/>
            <span style={{fontSize:10,color:"#64748b",fontFamily:"monospace"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// SIDEBAR FILTERS
// ═══════════════════════════════════════════════════════
function Sidebar({search,setSearch,region,setRegion,status,setStatus,typ,setTyp,mpFilter,setMpFilter,pistenRange,setPistenRange,lifteRange,setLifteRange,bergRange,setBergRange,talRange,setTalRange,onReset,userInput,setUserInput,onGeocode,geocoding,userCoords,sortBy,setSortBy,sortDir,setSortDir,resultCount}){
  const sortOpts=[{key:"pistenKm",label:"Pisten"},{key:"lifte",label:"Lifte"},{key:"bergHoehe",label:"Berghöhe"},{key:"hoehendiff",label:"Höhendiff"},{key:"distance",label:"Entfernung"}];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20,height:"100%"}}>
      {/* Logo */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#38bdf8,#818cf8)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⛷</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,letterSpacing:"0.02em",color:"#f1f5f9",fontFamily:"'Syne',sans-serif"}}>MagicPass</div>
            <div style={{fontSize:9,color:"#334155",fontFamily:"monospace",letterSpacing:"0.15em"}}>SKIGEBIETE DASHBOARD</div>
          </div>
        </div>
        <div style={{height:1,background:"rgba(255,255,255,0.05)",marginTop:14}}/>
      </div>

      {/* Standort */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>📍 Mein Standort</div>
        <div style={{display:"flex",gap:6}}>
          <input value={userInput} onChange={e=>setUserInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&onGeocode()}
            placeholder="Stadt oder PLZ eingeben…"
            style={{flex:1,padding:"8px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#e2e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={onGeocode} disabled={geocoding} style={{padding:"8px 12px",borderRadius:8,background:"rgba(56,189,248,0.15)",border:"1px solid rgba(56,189,248,0.3)",color:"#38bdf8",cursor:"pointer",fontSize:12,fontFamily:"monospace",whiteSpace:"nowrap"}}>

          </button>
        </div>
        {userCoords&&<div style={{fontSize:10,color:"#22c55e",marginTop:5,fontFamily:"monospace"}}>✓ {userCoords.name||`${userCoords.lat.toFixed(3)}, ${userCoords.lng.toFixed(3)}`}</div>}
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Skigebiet suchen…"
        style={{width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/>

      {/* Status */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>Status</div>
        <ChipFilter options={STATUS_OPTIONS} value={status} onChange={setStatus}/>
      </div>

      {/* Region */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>Region</div>
        <ChipFilter options={REGIONS} value={region} onChange={setRegion} colorMap={REGION_COLORS}/>
      </div>

      {/* Grösse */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>Grösse</div>
        <ChipFilter options={TYP_OPTIONS} value={typ} onChange={setTyp}/>
      </div>

      {/* MagicPass */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>MagicPass</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {MP_OPTIONS.map(opt=>{
            const active=mpFilter===opt;
            const isMp=opt==="Im MagicPass";
            const isNotMp=opt==="Nicht im MagicPass";
            const color=isMp?"#a5b4fc":isNotMp?"#94a3b8":"#38bdf8";
            return(
              <button key={opt} onClick={()=>setMpFilter(opt)} style={{
                padding:"6px 12px",borderRadius:9,fontSize:11,fontFamily:"'DM Mono',monospace",
                cursor:"pointer",border:"none",textAlign:"left",display:"flex",alignItems:"center",gap:8,
                background:active?(isMp?"rgba(99,102,241,0.2)":isNotMp?"rgba(148,163,184,0.12)":"rgba(56,189,248,0.15)"):"rgba(255,255,255,0.04)",
                color:active?color:"#475569",
                outline:active?`1px solid ${color}44`:"1px solid transparent",
                transition:"all .15s",
              }}>
                {isMp&&<div style={{width:9,height:9,borderRadius:2,background:active?"#818cf8":"#334155",flexShrink:0,boxShadow:active?"0 0 5px #818cf8":""}}/>}
                {isNotMp&&<div style={{width:9,height:9,borderRadius:"50%",background:active?"#64748b":"#334155",flexShrink:0}}/>}
                {opt==="Alle"&&<div style={{width:9,height:9,borderRadius:"50%",background:active?"#38bdf8":"#334155",flexShrink:0}}/>}
                {opt}
              </button>
            );
          })}
        </div>
      </div>

      {/* Ranges */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontFamily:"monospace"}}>Pisten &amp; Lifte</div>
        <RangeInput min={0} max={450} value={pistenRange} onChange={setPistenRange} label="Pistenkilometer" unit=" km"/>
        <RangeInput min={0} max={90}  value={lifteRange}  onChange={setLifteRange}  label="Anzahl Lifte"    unit=""/>
      </div>
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontFamily:"monospace"}}>Höhen</div>
        <RangeInput min={800}  max={3900} value={bergRange} onChange={setBergRange} label="Bergstation" unit="m"/>
        <RangeInput min={400}  max={2200} value={talRange}  onChange={setTalRange}  label="Talstation"  unit="m"/>
      </div>

      {/* Sort */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"monospace"}}>Sortieren</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {sortOpts.map(o=>(
            <button key={o.key} onClick={()=>{if(sortBy===o.key)setSortDir(d=>d==="desc"?"asc":"desc");else{setSortBy(o.key);setSortDir("asc");}}}
              disabled={o.key==="distance"&&!userCoords}
              style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontFamily:"'DM Mono',monospace",cursor:o.key==="distance"&&!userCoords?"not-allowed":"pointer",border:"none",opacity:o.key==="distance"&&!userCoords?.5:1,background:sortBy===o.key?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",color:sortBy===o.key?"#38bdf8":"#475569",outline:sortBy===o.key?"1px solid rgba(56,189,248,0.3)":"1px solid transparent"}}>
              {o.label}{sortBy===o.key?(sortDir==="desc"?"↓":"↑"):""}
            </button>
          ))}
        </div>
      </div>

      <div style={{fontSize:11,color:"#334155",fontFamily:"monospace",textAlign:"center"}}>{resultCount} Skigebiete</div>

      <button onClick={onReset} style={{marginTop:"auto",padding:"8px",width:"100%",borderRadius:9,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",color:"#475569",fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em",textTransform:"uppercase"}}>
        Filter zurücksetzen
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("liste"); // liste | karte | favoriten
  const[search,setSearch]=useState("");
  const[region,setRegion]=useState("Alle");
  const[status,setStatus]=useState("Alle");
  const[typ,setTyp]=useState("Alle");
  const[mpFilter,setMpFilter]=useState("Im MagicPass");
  const[pistenRange,setPistenRange]=useState([0,450]);
  const[lifteRange,setLifteRange]=useState([0,90]);
  const[bergRange,setBergRange]=useState([800,3900]);
  const[talRange,setTalRange]=useState([400,2200]);
  const[sortBy,setSortBy]=useState("pistenKm");
  const[sortDir,setSortDir]=useState("desc");
  const[userInput,setUserInput]=useState("");
  const[userCoords,setUserCoords]=useState(null);
  const[geocoding,setGeocoding]=useState(false);
  const[weather,setWeather]=useState({});  // {stationId: {temp,code,snow,wind}}
  const[loadingWeather,setLoadingWeather]=useState(false);
  const[favorites,setFavorites]=useState(()=>{try{return JSON.parse(localStorage.getItem("mp_favs")||"[]")}catch{return[]}});
  const[drawerOpen,setDrawerOpen]=useState(false);

  // Persist favorites
  useEffect(()=>{localStorage.setItem("mp_favs",JSON.stringify(favorites));},[favorites]);

  const toggleFav=useCallback((id)=>{
    setFavorites(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]);
  },[]);

  // Geocode user location
  const geocode=async()=>{
    const q=userInput.trim();
    if(!q)return;
    setGeocoding(true);
    try{
      const res=await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=ch,fr,it,de,at`,
        {headers:{"Accept-Language":"de","User-Agent":"MagicPass-Dashboard/1.0"}}
      );
      if(!res.ok)throw new Error("Netzwerkfehler");
      const data=await res.json();
      if(data&&data.length>0){
        const coords={lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon),name:data[0].display_name.split(",")[0]};
        setUserCoords(coords);
        setSortBy("distance");
        setSortDir("asc");
      } else {
        // Fallback: try without country filter
        const res2=await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
          {headers:{"Accept-Language":"de"}}
        );
        const data2=await res2.json();
        if(data2&&data2.length>0){
          setUserCoords({lat:parseFloat(data2[0].lat),lng:parseFloat(data2[0].lon),name:data2[0].display_name.split(",")[0]});
          setSortBy("distance");
          setSortDir("asc");
        } else {
          alert(`"${q}" wurde nicht gefunden. Versuche eine grössere Stadt oder Kanton.`);
        }
      }
    }catch(e){
      alert("Verbindungsfehler beim Geocoding. Bitte Internet prüfen.");
    }
    setGeocoding(false);
  };

  // Compute distances
  const distances=useMemo(()=>{
    if(!userCoords)return null;
    const d={};
    STATIONS.forEach(s=>{d[s.id]=haversine(userCoords.lat,userCoords.lng,s.lat,s.lng);});
    return d;
  },[userCoords]);

  // Fetch weather for visible stations (batched)
  const fetchWeather=useCallback(async(stationsToFetch)=>{
    if(loadingWeather)return;
    setLoadingWeather(true);
    const newW={};
    // Open-Meteo: batch up to 10 per call (we do 3 batches)
    const chunks=[];
    for(let i=0;i<stationsToFetch.length;i+=10)chunks.push(stationsToFetch.slice(i,i+10));
    for(const chunk of chunks){
      await Promise.all(chunk.map(async s=>{
        try{
          const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,weather_code,wind_speed_10m,snow_depth&wind_speed_unit=kmh&timezone=Europe%2FBerlin`;
          const r=await fetch(url);
          const d=await r.json();
          newW[s.id]={temp:Math.round(d.current.temperature_2m),code:d.current.weather_code,wind:Math.round(d.current.wind_speed_10m),snow:Math.round((d.current.snow_depth||0)*100)};
        }catch{/*skip*/}
      }));
    }
    setWeather(w=>({...w,...newW}));
    setLoadingWeather(false);
  },[loadingWeather]);

  // Load weather on first render (first 30 stations)
  useEffect(()=>{fetchWeather(STATIONS.slice(0,30));},[]);

  // Filter + sort
  const filtered=useMemo(()=>{
    let r=STATIONS.filter(s=>{
      if(search&&!s.name.toLowerCase().includes(search.toLowerCase()))return false;
      if(region!=="Alle"&&s.region!==region)return false;
      if(status!=="Alle"&&s.status!==status)return false;
      if(typ!=="Alle"&&s.typ!==typ)return false;
      if(mpFilter==="Im MagicPass"&&!s.magicpass)return false;
      if(mpFilter==="Nicht im MagicPass"&&s.magicpass)return false;
      if(s.pistenKm<pistenRange[0]||s.pistenKm>pistenRange[1])return false;
      if(s.lifte<lifteRange[0]||s.lifte>lifteRange[1])return false;
      if(s.bergHoehe<bergRange[0]||s.bergHoehe>bergRange[1])return false;
      if(s.talHoehe<talRange[0]||s.talHoehe>talRange[1])return false;
      return true;
    });
    return[...r].sort((a,b)=>{
      if(sortBy==="distance"&&distances){return sortDir==="asc"?(distances[a.id]||9999)-(distances[b.id]||9999):(distances[b.id]||9999)-(distances[a.id]||9999);}
      if(sortBy==="name")return sortDir==="asc"?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
      return sortDir==="desc"?b[sortBy]-a[sortBy]:a[sortBy]-b[sortBy];
    });
  },[search,region,status,typ,mpFilter,pistenRange,lifteRange,bergRange,talRange,sortBy,sortDir,distances]);

  const favStations=useMemo(()=>STATIONS.filter(s=>favorites.includes(s.id)),[favorites]);
  const resetAll=()=>{setSearch("");setRegion("Alle");setStatus("Alle");setTyp("Alle");setMpFilter("Im MagicPass");setPistenRange([0,450]);setLifteRange([0,90]);setBergRange([800,3900]);setTalRange([400,2200]);};
  const offenCount=filtered.filter(s=>s.status==="offen").length;
  const mpCount=filtered.filter(s=>s.magicpass).length;

  const sidebarProps={search,setSearch,region,setRegion,status,setStatus,typ,setTyp,mpFilter,setMpFilter,pistenRange,setPistenRange,lifteRange,setLifteRange,bergRange,setBergRange,talRange,setTalRange,onReset:resetAll,userInput,setUserInput,onGeocode:geocode,geocoding,userCoords,sortBy,setSortBy,sortDir,setSortDir,resultCount:filtered.length};

  const TABS=[{key:"liste",icon:"☰",label:"Liste"},{key:"karte",icon:"🗺",label:"Karte"},{key:"favoriten",icon:"⭐",label:`Favoriten (${favorites.length})`}];

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#060d1a",fontFamily:"'Syne',sans-serif",color:"#f1f5f9",overflow:"hidden"}}>

      {/* TOP BAR */}
      <div style={{flexShrink:0,background:"rgba(13,27,42,0.95)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"0 20px",height:52,gap:16,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginRight:8}}>
          <div style={{fontSize:20}}>⛷</div>
          <div style={{fontSize:13,fontWeight:800,letterSpacing:"0.02em",whiteSpace:"nowrap"}}>MagicPass</div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:2,flex:1}}>
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} className={tab===t.key?"tab-active":""} style={{padding:"0 14px",height:52,background:"none",border:"none",color:tab===t.key?"#f1f5f9":"#475569",cursor:"pointer",fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:tab===t.key?700:400,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
              <span>{t.icon}</span><span className="mobile-only" style={{display:"none"}}>{t.label}</span>
              <span style={{}} className="tab-label">{t.label}</span>
            </button>
          ))}
        </div>

        {/* Weather loading */}
        {loadingWeather&&<div style={{fontSize:10,color:"#38bdf8",fontFamily:"monospace",animation:"pulse 1s infinite"}}>🌤 Wetter wird geladen…</div>}

        {/* Mobile filter btn */}
        <button onClick={()=>setDrawerOpen(o=>!o)} className="mobile-only" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",fontSize:12,cursor:"pointer",fontFamily:"monospace",flexShrink:0}}>
          ⚙
        </button>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* SIDEBAR (desktop) */}
        <div className="sidebar-desktop" style={{width:290,flexShrink:0,background:"rgba(10,20,35,0.97)",borderRight:"1px solid rgba(255,255,255,0.05)",padding:"22px 18px",overflowY:"auto"}}>
          <Sidebar {...sidebarProps}/>
        </div>

        {/* MOBILE DRAWER */}
        {drawerOpen&&(
          <div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setDrawerOpen(false)}>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(4px)"}}/>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:300,background:"rgba(10,20,35,0.99)",padding:"22px 18px",overflowY:"auto",zIndex:1}} onClick={e=>e.stopPropagation()}>
              <button onClick={()=>setDrawerOpen(false)} style={{position:"absolute",top:14,right:14,background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:18}}>✕</button>
              <Sidebar {...sidebarProps}/>
            </div>
          </div>
        )}

        {/* CONTENT */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* ── LISTE TAB ── */}
          {tab==="liste"&&(
            <div style={{flex:1,overflowY:"auto",padding:"20px 20px"}}>
              {/* Stats */}
              <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
                <StatPill label="Stationen"  value={filtered.length}/>
                <StatPill label="Offen"       value={offenCount}/>
                <StatPill label="✦ MagicPass" value={mpCount}/>
                <StatPill label="Total km"    value={`${filtered.reduce((a,s)=>a+s.pistenKm,0)} km`}/>
                <StatPill label="Lifte"       value={filtered.reduce((a,s)=>a+s.lifte,0)}/>
              </div>
              {/* Cards */}
              {filtered.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"#334155"}}>
                  <div style={{fontSize:40,marginBottom:12}}>🏔</div>
                  <div style={{fontWeight:600}}>Keine Skigebiete gefunden</div>
                  <div style={{fontSize:13,marginTop:6}}>Filter anpassen</div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
                  {filtered.map(s=>(
                    <SkiCard key={s.id} s={s} distance={distances?.[s.id]??null} weather={weather[s.id]} isFav={favorites.includes(s.id)} onToggleFav={toggleFav} onSelect={s=>{setTab("karte");}}/>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ── KARTE TAB ── */}
          {tab==="karte"&&(
            <div style={{flex:1,overflow:"hidden"}}>
              <MapView stations={filtered} userCoords={userCoords} favorites={favorites} onToggleFav={toggleFav} weather={weather} distances={distances}/>
            </div>
          )}

          {/* ── FAVORITEN TAB ── */}
          {tab==="favoriten"&&(
            <div style={{flex:1,overflowY:"auto",padding:"20px 20px"}}>
              {favStations.length===0?(
                <div style={{textAlign:"center",padding:"80px 20px",color:"#334155"}}>
                  <div style={{fontSize:48,marginBottom:14}}>⭐</div>
                  <div style={{fontWeight:700,fontSize:16}}>Noch keine Favoriten</div>
                  <div style={{fontSize:13,marginTop:8,color:"#475569"}}>Klicke in der Liste oder auf der Karte auf ⭐ um Skigebiete zu speichern.</div>
                </div>
              ):(
                <>
                  <div style={{marginBottom:16,fontSize:12,color:"#475569",fontFamily:"monospace"}}>{favStations.length} gespeicherte Skigebiete</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
                    {favStations.map(s=>(
                      <SkiCard key={s.id} s={s} distance={distances?.[s.id]??null} weather={weather[s.id]} isFav={true} onToggleFav={toggleFav}/>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}

        </div>
      </div>

      <style>{`
        @media(max-width:767px){
          .sidebar-desktop{display:none!important}
          .mobile-only{display:flex!important}
          .tab-label{display:none}
        }
        @media(min-width:768px){
          .mobile-only{display:none!important}
          .tab-label{display:inline}
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

    .leaflet-popup-tip{background:#0d1b2a}
    .leaflet-popup-close-button{color:#64748b!important;font-size:16px!important;top:6px!important;right:8px!important}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
    .user-pin{animation:pulse 2s ease-in-out infinite}
    .ski-card{transition:transform .15s,box-shadow .15s}
    .ski-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
    .tab-btn{position:relative}
    .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:2px}
    @media(max-width:767px){.sidebar-desktop{display:none!important}}
    @media(min-width:768px){.mobile-only{display:none!important}.tab-label-short{display:none!important}}
    @media(max-width:767px){.tab-label-full{display:none!important}}

const CORS_PROXY="https://corsproxy.io/?url=";
async function fetchLiveStatus(stationsToRefresh){
  const results={};
  for(let i=0;i<stationsToRefresh.length;i+=5){
    const chunk=stationsToRefresh.slice(i,i+5).filter(s=>s.skiresort_slug);
    await Promise.all(chunk.map(async s=>{
      try{
        const url=`${CORS_PROXY}https://www.skiresort.ch/skigebiet/${s.skiresort_slug}/schneebericht/`;
        const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
        const html=await r.text();
        const doc=new DOMParser().parseFromString(html,"text/html");
        // Parse open/closed status
        const statusEl=doc.querySelector(".open-closed-status,.resort-open-status,[class*='status']");
        let newStatus=s.status;
        const bodyText=doc.body?.textContent||"";
        if(/ge[öo]ffnet|offen|open/i.test(bodyText))newStatus="offen";
        else if(/geschlossen|closed/i.test(bodyText))newStatus="geschlossen";
        // Parse open lifts: look for pattern like "12 / 30 Lifte"
        const liftMatch=bodyText.match(/(\d+)\s*\/\s*(\d+)\s*Lif/i);
        // Parse open km: look for pattern like "45 / 100 km"
        const kmMatch=bodyText.match(/(\d+)\s*\/\s*(\d+)\s*km/i);
        results[s.id]={
          status:newStatus,
          lifteO:liftMatch?parseInt(liftMatch[1]):s.lifteO,
          lifte:liftMatch?parseInt(liftMatch[2]):s.lifte,
          kmO:kmMatch?parseInt(kmMatch[1]):s.kmO,
          km:kmMatch?parseInt(kmMatch[2]):s.km
        };
      }catch(e){results[s.id]=null;}
    }));
    if(i+5<stationsToRefresh.length)await new Promise(r=>setTimeout(r,300));
  }
  return results;
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function wIcon(c){if(c===0)return"☀️";if(c<=2)return"🌤️";if(c<=3)return"☁️";if(c<=48)return"🌫️";if(c<=57)return"🌦️";if(c<=67)return"🌧️";if(c<=77)return"❄️";if(c<=82)return"🌧️";if(c<=86)return"🌨️";return"⛈️";}
function pct(o,t){return t>0?Math.round((o/t)*100):0;}
function barColor(p){return p>60?"#22c55e":p>30?"#f59e0b":"#ef4444";}

function RangeInput({min,max,value,onChange,label}){

  const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,isNaN(v)?lo:v));

  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"monospace",marginBottom:8}}>{label}</div>

        <input type="range" min={min} max={max} value={value[0]} onChange={e=>onChange([Math.min(+e.target.value,value[1]-1),value[1]])} style={{position:"absolute",width:"100%",opacity:0,cursor:"pointer",height:18,zIndex:2}}/>

  });

  const[wx,setWx]=useState({});
  const[loading,setLoading]=useState(false);
  const[liveLoading,setLiveLoading]=useState(false);
  const[lastRefresh,setLastRefresh]=useState(null);
  const[liveData,setLiveData]=useState({});
  const[geo,setGeo]=useState(false);

  useEffect(()=>{localStorage.setItem("mp_favs",JSON.stringify(favs));},[favs]);
  const toggleFav=useCallback(id=>setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]),[]);

  const refreshLive=useCallback(async()=>{
    if(liveLoading)return;
    setLiveLoading(true);
    try{
      const withSlugs=STATIONS.filter(s=>s.skiresort_slug);
      const results=await fetchLiveStatus(withSlugs);
      setLiveData(d=>({...d,...Object.fromEntries(Object.entries(results).filter(([,v])=>v!==null))}));
      setLastRefresh(new Date());
    }catch(e){}
    setLiveLoading(false);
  },[liveLoading]);

  const geocode=async()=>{
    const q=st.userInput.trim();
    if(!q)return;
    setGeo(true);
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{"Accept-Language":"de","User-Agent":"MagicPassDash/2.1"}});
      const d=await r.json();
      if(d&&d.length>0){
        const coords={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),name:d[0].display_name.split(",")[0]};
        set("userCoords",coords);
        set("sortBy","distance");
        set("sortDir","asc");
      }else{
        alert(`"${q}" nicht gefunden.`);
      }
    }catch{
      alert("Verbindungsfehler.");
    }
    setGeo(false);
  };

  const dists=useMemo(()=>{
    if(!st.userCoords)return null;
    const d={};
    STATIONS.forEach(s=>{d[s.id]=haversine(st.userCoords.lat,st.userCoords.lng,s.lat,s.lng);});
    return d;
  },[st.userCoords]);

  const fetchWx=useCallback(async(list)=>{
    if(loading)return;
    setLoading(true);
    const newW={};
    for(let i=0;i<list.length;i+=10){
      const chunk=list.slice(i,i+10);
      await Promise.all(chunk.map(async s=>{
        try{
          const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,weather_code,wind_speed_10m,snow_depth&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum&wind_speed_unit=kmh&timezone=Europe%2FBerlin&forecast_days=3`;
          const r=await fetch(url);
          const d=await r.json();
          if(d.current)newW[s.id]={temp:Math.round(d.current.temperature_2m),code:d.current.weather_code,wind:Math.round(d.current.wind_speed_10m),snow:Math.round((d.current.snow_depth||0)*100),forecast:d.daily?[1,2].map(i=>({dateLabel:new Date(d.daily.time[i]).toLocaleDateString("de-CH",{weekday:"short"}),maxTemp:Math.round(d.daily.temperature_2m_max[i]),minTemp:Math.round(d.daily.temperature_2m_min[i]),code:d.daily.weather_code[i],precip:Math.round(d.daily.precipitation_sum[i]||0)})):[]};
        }catch{}
      }));
      await new Promise(r=>setTimeout(r,150));
    }
    setWx(w=>({...w,...newW}));
    setLoading(false);
  },[loading]);

  useEffect(()=>{fetchWx(STATIONS);},[]);

  const filtered=useMemo(()=>{
    const{search,region,status,typ,mpF,pistenR,lifteR,bergR,talR,sortBy,sortDir}=st;
    const r=STATIONS.map(s=>liveData[s.id]?{...s,...liveData[s.id]}:s).filter(s=>{
      if(search&&!s.name.toLowerCase().includes(search.toLowerCase()))return false;
      if(region!=="Alle"&&s.region!==region)return false;
      if(status!=="Alle"&&s.status!==status)return false;
      if(typ!=="Alle"&&s.typ!==typ)return false;
      if(mpF==="Im MagicPass"&&!s.mp)return false;
      if(mpF==="Nicht im MagicPass"&&s.mp)return false;
      if(s.km<pistenR[0]||s.km>pistenR[1])return false;
      if(s.lifte<lifteR[0]||s.lifte>lifteR[1])return false;
      if(s.berg<bergR[0]||s.berg>bergR[1])return false;
      if(s.tal<talR[0]||s.tal>talR[1])return false;
      return true;
    });
    return [...r].sort((a,b)=>{
      if(sortBy==="distance"&&dists){
        return sortDir==="asc"?(dists[a.id]||9999)-(dists[b.id]||9999):(dists[b.id]||9999)-(dists[a.id]||9999);
      }
      return sortDir==="desc"?b[sortBy]-a[sortBy]:a[sortBy]-b[sortBy];
    });
  },[st,dists,liveData]);

  const favStations=useMemo(()=>STATIONS.filter(s=>favs.includes(s.id)),[favs]);

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#060d1a",fontFamily:"'Syne',sans-serif",color:"#f1f5f9",overflow:"hidden"}}>
      <div style={{flexShrink:0,background:"rgba(13,27,42,0.97)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"0 16px",height:50,gap:12}}>
        <div style={{fontSize:13,fontWeight:800}}>⛷ Ski Dashboard CH·FR·IT</div>
        <div style={{display:"flex",gap:8,marginLeft:12}}>
          {[["liste","Liste"],["karte","\ud83d\uddfa Karte"],["favoriten","Favoriten"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{border:"none",padding:"6px 10px",borderRadius:8,background:tab===k?"rgba(56,189,248,0.2)":"rgba(255,255,255,0.06)",color:tab===k?"#38bdf8":"#94a3b8",cursor:"pointer"}}>{l}</button>)}
        </div>
        {loading&&<div style={{marginLeft:"auto",fontSize:11,color:"#38bdf8",fontFamily:"monospace"}}>Wetter wird geladen…</div>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {lastRefresh&&<div style={{fontSize:10,color:"#475569",fontFamily:"monospace"}}>Live: {lastRefresh.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"})}</div>}
          <button onClick={refreshLive} disabled={liveLoading} title="Status, Lifte & Pisten live von skiresort.ch aktualisieren" style={{padding:"5px 10px",borderRadius:8,background:liveLoading?"rgba(255,255,255,0.06)":"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.3)",color:liveLoading?"#475569":"#22c55e",cursor:liveLoading?"default":"pointer",fontSize:11,fontFamily:"monospace",whiteSpace:"nowrap"}}>
            {liveLoading?"⏳ Aktualisiere…":"🔄 Live-Daten"}
          </button>
        </div>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{width:300,flexShrink:0,background:"rgba(10,20,35,0.98)",borderRight:"1px solid rgba(255,255,255,0.05)",padding:"16px",overflowY:"auto"}}>
          <div style={{fontSize:10,color:"#475569",marginBottom:7,fontFamily:"monospace"}}>Mein Standort</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input value={st.userInput} onChange={e=>set("userInput",e.target.value)} onKeyDown={e=>e.key==="Enter"&&geocode()} placeholder="Ort oder PLZ" style={{flex:1,padding:"7px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#e2e8f0",fontSize:12}}/>
            <button onClick={geocode} disabled={geo} style={{padding:"7px 10px",borderRadius:8,background:"rgba(56,189,248,0.15)",border:"1px solid rgba(56,189,248,0.3)",color:"#38bdf8",cursor:"pointer"}}>{geo?"…":"→"}</button>
          </div>

          <input value={st.search} onChange={e=>set("search",e.target.value)} placeholder="Skigebiet suchen" style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#e2e8f0",marginBottom:12}}/>

          <div style={{fontSize:10,color:"#475569",marginBottom:6,fontFamily:"monospace"}}>MagicPass</div>
          <Chips opts={MP_OPTS} val={st.mpF} onChange={v=>set("mpF",v)}/>

          <div style={{marginTop:12,fontSize:10,color:"#475569",marginBottom:6,fontFamily:"monospace"}}>Status</div>
          <Chips opts={STATUS_OPTS} val={st.status} onChange={v=>set("status",v)}/>

          <div style={{marginTop:12,fontSize:10,color:"#475569",marginBottom:6,fontFamily:"monospace"}}>Region</div>
          <Chips opts={REGIONS} val={st.region} onChange={v=>set("region",v)} cmap={RC}/>

          <div style={{marginTop:12,fontSize:10,color:"#475569",marginBottom:6,fontFamily:"monospace"}}>Grösse</div>
          <Chips opts={TYP_OPTS} val={st.typ} onChange={v=>set("typ",v)}/>

          <div style={{marginTop:12}}>
            <RangeInput min={0} max={1200} value={st.pistenR} onChange={v=>set("pistenR",v)} label="Pistenkilometer"/>
            <RangeInput min={0} max={500} value={st.lifteR} onChange={v=>set("lifteR",v)} label="Lifte"/>
            <RangeInput min={400} max={3900} value={st.bergR} onChange={v=>set("bergR",v)} label="Bergstation"/>
            <RangeInput min={400} max={2200} value={st.talR} onChange={v=>set("talR",v)} label="Talstation"/>
          </div>

          <div style={{marginTop:8,fontSize:10,color:"#475569",fontFamily:"monospace"}}>{filtered.length} Gebiete gefunden</div>
        </div>

        <div style={{flex:1,overflow:tab==="karte"?"hidden":"auto",padding:tab==="karte"?0:"18px 16px",position:"relative"}}>
          {tab==="liste"&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:14}}>
              {filtered.map(s=><SkiCard key={s.id} s={s} dist={dists?.[s.id]??null} wx={wx[s.id]} isFav={favs.includes(s.id)} onFav={toggleFav}/>) }
            </div>
          )}
          {tab==="favoriten"&&(
            favStations.length===0?
              <div style={{textAlign:"center",padding:"80px 20px",color:"#475569"}}>Noch keine Favoriten gespeichert.</div>:
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:14}}>
                {favStations.map(s=><SkiCard key={s.id} s={s} dist={dists?.[s.id]??null} wx={wx[s.id]} isFav={true} onFav={toggleFav}/>) }
              </div>
          )}
          {tab==="karte"&&(
            <div style={{position:"relative",height:"100%"}}>
              <MapView stations={filtered} wx={wx} dists={dists} userCoords={st.userCoords}/>
              <div style={{position:"absolute",bottom:10,right:10,zIndex:1000,background:"rgba(6,13,26,0.85)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 12px",fontSize:10,color:"#94a3b8",fontFamily:"monospace",pointerEvents:"none"}}>
                {filtered.length} Gebiete &nbsp;&bull;&nbsp;
                <span style={{color:"#22c55e"}}>{filtered.filter(s=>s.status==="offen").length} offen</span> &nbsp;&bull;&nbsp;
                <span style={{color:"#ef4444"}}>{filtered.filter(s=>s.status!=="offen").length} geschlossen</span>
              </div>
              <div style={{position:"absolute",top:10,right:10,zIndex:1000,background:"rgba(6,13,26,0.85)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 12px",fontSize:10,color:"#64748b",fontFamily:"monospace",maxWidth:220,pointerEvents:"none"}}>
                {Object.entries(RC).filter(([r])=>filtered.some(s=>s.region===r)).map(([r,c])=>(
                  <span key={r} style={{display:"inline-flex",alignItems:"center",gap:3,marginRight:8,marginBottom:2}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:c,display:"inline-block"}}/>{r}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

// UTILS
// ═══════════════════════════════════════════════════════════════════════
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function wIcon(c){if(c===0)return"☀️";if(c<=2)return"🌤️";if(c<=3)return"☁️";if(c<=48)return"🌫️";if(c<=57)return"🌦️";if(c<=67)return"🌧️";if(c<=77)return"❄️";if(c<=82)return"🌧️";if(c<=86)return"🌨️";return"⛈️";}
function pct(o,t){return t>0?Math.round((o/t)*100):0;}
function barColor(p){return p>60?"#22c55e":p>30?"#f59e0b":"#ef4444";}

function RangeInput({min,max,value,onChange,label,unit}){
  const sty={width:"100%",padding:"5px 8px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#e2e8f0",fontSize:12,fontFamily:"'DM Mono',monospace",outline:"none",textAlign:"center"};
  const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,isNaN(v)?lo:v));
  const p=(v)=>((v-min)/(max-min))*100;
  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"monospace",marginBottom:8}}>{label}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6,alignItems:"center",marginBottom:8}}>
        <div>
          <div style={{fontSize:9,color:"#334155",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"monospace",marginBottom:3,textAlign:"center"}}>MIN</div>
          <input type="number" min={min} max={value[1]-1} value={value[0]} onChange={e=>onChange([cl(+e.target.value,min,value[1]-1),value[1]])} onFocus={e=>e.target.style.borderColor="#38bdf8"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"} style={sty}/>
        </div>
        <div style={{fontSize:10,color:"#334155",fontFamily:"monospace",paddingTop:14,textAlign:"center"}}>—</div>
        <div>
          <div style={{fontSize:9,color:"#334155",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"monospace",marginBottom:3,textAlign:"center"}}>MAX</div>
          <input type="number" min={value[0]+1} max={max} value={value[1]} onChange={e=>onChange([value[0],cl(+e.target.value,value[0]+1,max)])} onFocus={e=>e.target.style.borderColor="#818cf8"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"} style={sty}/>
        </div>
      </div>
      <div style={{position:"relative",height:18,display:"flex",alignItems:"center"}}>
        <div style={{position:"absolute",left:0,right:0,height:3,background:"rgba(255,255,255,0.08)",borderRadius:2}}/>
        <div style={{position:"absolute",left:`${p(value[0])}%`,right:`${100-p(value[1])}%`,height:3,background:"linear-gradient(90deg,#38bdf8,#818cf8)",borderRadius:2}}/>
        <input type="range" min={min} max={max} value={value[0]} onChange={e=>onChange([Math.min(+e.target.value,value[1]-1),value[1]])} style={{position:"absolute",width:"100%",opacity:0,cursor:"pointer",height:18,zIndex:2}}/>
        <input type="range" min={min} max={max} value={value[1]} onChange={e=>onChange([value[0],Math.max(+e.target.value,value[0]+1)])} style={{position:"absolute",width:"100%",opacity:0,cursor:"pointer",height:18,zIndex:3}}/>
        <div style={{position:"absolute",left:`calc(${p(value[0])}% - 5px)`,width:10,height:10,borderRadius:"50%",background:"#38bdf8",boxShadow:"0 0 6px #38bdf8",border:"2px solid #060d1a",zIndex:4,pointerEvents:"none"}}/>
        <div style={{position:"absolute",left:`calc(${p(value[1])}% - 5px)`,width:10,height:10,borderRadius:"50%",background:"#818cf8",boxShadow:"0 0 6px #818cf8",border:"2px solid #060d1a",zIndex:4,pointerEvents:"none"}}/>
      </div>
    </div>
  );
}

    <div className="ski-card" style={{background:"rgba(13,27,42,0.92)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:18,display:"flex",flexDirection:"column",gap:11,boxShadow:"0 2px 20px rgba(0,0,0,0.3)",borderLeft:`3px solid ${open?"#22c55e":"#ef4444"}`}}>

          </div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();onFav(s.id)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,opacity:isFav?1:0.3,transition:"all .15s",transform:isFav?"scale(1.2)":"scale(1)"}} title="Favorit">⭐</button>

      {/* Weather + Distance */}

        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>

            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"5px 9px",display:"flex",alignItems:"center",gap:6,flex:1,minWidth:110}}>

        ))}
      </div>

      {/* Website Link */}
      {s.url&&(
        <a href={s.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}

          <span style={{fontSize:12}}>🌐</span>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.url.replace("https://www.","").replace("https://","")}</span>
          <span style={{marginLeft:"auto",fontSize:10}}>↗</span>
        </a>
      )}
    </div>
  );
}

// MAP VIEW
// ═══════════════════════════════════════════════════════════════════════
function MapView({stations,userCoords,favorites,onFav,wx,dists}){
  const mapRef=useRef(null);
  const mapInst=useRef(null);
  const markers=useRef([]);

  useEffect(()=>{
    if(mapInst.current)return;
    const map=L.map(mapRef.current,{center:[46.5,8.0],zoom:7});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    mapInst.current=map;
    return()=>{map.remove();mapInst.current=null;};
  },[]);

  useEffect(()=>{
    const map=mapInst.current;
    if(!map)return;
    markers.current.forEach(m=>map.removeLayer(m));
    markers.current=[];

    stations.forEach(s=>{
      const open=s.status==="offen";
      const isFav=favorites.includes(s.id);
      const dist=dists?.[s.id];
      const w=wx?.[s.id];
      const col=open?"#22c55e":"#ef4444";
      const sz=isFav?16:s.mp?13:11;
      const br=s.mp?"3px":"50%";
      const ico=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:${br};background:${col};border:2px solid ${isFav?"#fbbf24":s.mp?"rgba(165,180,252,0.7)":"rgba(255,255,255,0.2)"};box-shadow:0 0 ${isFav?10:6}px ${col}88;cursor:pointer;"></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      const marker=L.marker([s.lat,s.lng],{ico}).addTo(map);

      const kp=pct(s.kmO,s.km),lp=pct(s.lifteO,s.lifte);
      const mpTag=s.mp?`<span style="padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;background:rgba(99,102,241,0.2);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3)">✦ MP</span>`:`<span style="padding:1px 6px;border-radius:10px;font-size:9px;background:rgba(255,255,255,0.06);color:#475569;border:1px solid rgba(255,255,255,0.08)">Kein MP</span>`;
      const wTag=w?`<div style="display:flex;align-items:center;gap:5px;padding:4px 7px;background:rgba(255,255,255,0.05);border-radius:6px;margin-top:6px"><span style="font-size:16px">${wIcon(w.code)}</span><div><div style="font-size:12px;font-weight:600;color:#e2e8f0">${w.temp}°C</div><div style="font-size:9px;color:#64748b">❄️${w.snow}cm 💨${w.wind}km/h</div></div></div>`:"";
      const dTag=dist!=null?`<div style="font-size:11px;color:#38bdf8;font-family:monospace;margin-top:4px">📍 ${dist} km entfernt</div>`:"";
      const urlTag=s.url?`<a href="${s.url}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:4px;margin-top:7px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;font-size:10px;font-family:monospace;text-decoration:none">🌐 Website besuchen ↗</a>`:"";

      marker.bindPopup(`
        <div style="font-family:'Syne',sans-serif;min-width:210px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;flex-wrap:wrap">
            <strong style="font-size:14px;color:#f1f5f9;line-height:1.3;flex:1">${s.name}</strong>
            <span style="padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;white-space:nowrap;background:${open?"rgba(34,197,94,0.15)":"rgba(239,68,68,0.15)"};color:${open?"#22c55e":"#ef4444"};border:1px solid ${open?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}">${open?"● OFFEN":"○ ZU"}</span>
          </div>
          <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
            <span style="font-size:10px;color:#64748b">${s.region}</span>${mpTag}
          </div>
          ${wTag}${dTag}
          <div style="margin-top:7px">
            <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">🎿 Pisten</div>
            <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace"><span style="color:${barColor(kp)}">${s.kmO}</span> / ${s.km} km (${kp}%)</div>
            <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:3px"><div style="height:100%;width:${kp}%;background:${barColor(kp)};border-radius:2px"></div></div>
          </div>
          <div style="margin-top:5px">
            <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">🚡 Lifte</div>
            <div style="font-size:12px;font-weight:600;color:#e2e8f0;font-family:monospace"><span style="color:${barColor(lp)}">${s.lifteO}</span> / ${s.lifte} (${lp}%)</div>
            <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:3px"><div style="height:100%;width:${lp}%;background:${barColor(lp)};border-radius:2px"></div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px">
            <div style="background:rgba(255,255,255,0.04);border-radius:5px;padding:4px 6px"><div style="font-size:11px;font-weight:600;color:#e2e8f0;font-family:monospace">▲${s.berg}m</div><div style="font-size:8px;color:#475569">Gipfel</div></div>
            <div style="background:rgba(255,255,255,0.04);border-radius:5px;padding:4px 6px"><div style="font-size:11px;font-weight:600;color:#e2e8f0;font-family:monospace">▼${s.tal}m</div><div style="font-size:8px;color:#475569">Tal</div></div>
          </div>
          ${urlTag}
          <button onclick="window._fav(${s.id})" style="margin-top:7px;width:100%;padding:4px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:${isFav?"#fbbf24":"#94a3b8"};cursor:pointer;font-size:10px;font-family:monospace">${isFav?"⭐ Favorit entfernen":"☆ Als Favorit speichern"}</button>
        </div>
      `,{maxWidth:270});
      markers.current.push(marker);
    });

    if(userCoords){
      const ui=L.divIcon({className:"",html:`<div class="user-pin" style="width:14px;height:14px;border-radius:50%;background:#38bdf8;border:2px solid white;box-shadow:0 0 12px #38bdf8"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
      const um=L.marker([userCoords.lat,userCoords.lng],{icon:ui,zIndexOffset:1000}).addTo(map);
      um.bindPopup(`<div style="font-family:'Syne',sans-serif;padding:2px"><strong style="color:#38bdf8">📍 ${userCoords.name||"Dein Standort"}</strong></div>`);
      markers.current.push(um);
    }
  },[stations,favorites,wx,dists,userCoords]);

  useEffect(()=>{window._fav=onFav;},[onFav]);

  return(
    <div style={{position:"relative",height:"100%"}}>
      <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",bottom:24,left:16,zIndex:1000,background:"rgba(13,27,42,0.93)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 14px",backdropFilter:"blur(8px)"}}>
        <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:7,fontFamily:"monospace"}}>Legende</div>
        {[["#22c55e","50%","none","Offen"],["#ef4444","50%","none","Geschlossen"],["#38bdf8","50%","none","Dein Standort"],["#22c55e","3px","rgba(165,180,252,0.6)","Im MagicPass (■)"],["#22c55e","50%","#fbbf24","Favorit"]].map(([c,r,b,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
            <div style={{width:9,height:9,borderRadius:r,background:c,border:b&&b!=="none"?`2px solid ${b}`:"none",boxShadow:`0 0 4px ${c}66`,flexShrink:0}}/>
            <span style={{fontSize:10,color:"#64748b",fontFamily:"monospace"}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════
function Sidebar({state,set,onReset,onGeo,geo,resultCount}){
  const{search,region,status,typ,mpF,pistenR,lifteR,bergR,talR,sortBy,sortDir,userInput,userCoords}=state;
  const S=set;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:18,height:"100%"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#38bdf8,#818cf8)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⛷</div>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9",fontFamily:"'Syne',sans-serif"}}>MagicPass</div>
            <div style={{fontSize:9,color:"#334155",fontFamily:"monospace",letterSpacing:"0.15em"}}>SKIGEBIETE DASHBOARD</div>
          </div>
        </div>
        <div style={{height:1,background:"rgba(255,255,255,0.05)",marginTop:14}}/>
      </div>

      {/* Standort */}
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>📍 Mein Standort</div>
        <div style={{display:"flex",gap:6}}>
          <input value={userInput} onChange={e=>S("userInput",e.target.value)} onKeyDown={e=>e.key==="Enter"&&onGeo()} placeholder="Ort oder PLZ…"
            style={{flex:1,padding:"7px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#e2e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={onGeo} disabled={geo} style={{padding:"7px 12px",borderRadius:8,background:"rgba(56,189,248,0.15)",border:"1px solid rgba(56,189,248,0.3)",color:"#38bdf8",cursor:geo?"wait":"pointer",fontSize:13,fontFamily:"monospace"}}>
            {geo?"…":"→"}
          </button>
        </div>
        {userCoords&&<div style={{fontSize:10,color:"#22c55e",marginTop:4,fontFamily:"monospace"}}>✓ {userCoords.name}</div>}
      </div>

      {/* Search */}
      <input value={search} onChange={e=>S("search",e.target.value)} placeholder="Skigebiet suchen…"
        style={{width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,color:"#e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit"}}/>

      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>MagicPass</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {MP_OPTS.map(o=>{
            const a=mpF===o;
            const c=o==="Im MagicPass"?"#a5b4fc":o==="Nicht im MagicPass"?"#94a3b8":"#38bdf8";
            return(
              <button key={o} onClick={()=>S("mpF",o)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace",cursor:"pointer",border:"none",textAlign:"left",display:"flex",alignItems:"center",gap:7,background:a?`${c}18`:"rgba(255,255,255,0.04)",color:a?c:"#475569",outline:a?`1px solid ${c}44`:"1px solid transparent"}}>
                <div style={{width:8,height:8,borderRadius:o==="Im MagicPass"?"2px":"50%",background:a?c:"#334155",flexShrink:0}}/>
                {o}
              </button>
            );
          })}
        </div>
      </div>

      <div><div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>Status</div><Chips opts={STATUS_OPTS} val={status} onChange={v=>S("status",v)}/></div>
      <div><div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>Region</div><Chips opts={REGIONS} val={region} onChange={v=>S("region",v)} cmap={RC}/></div>
      <div><div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>Grösse</div><Chips opts={TYP_OPTS} val={typ} onChange={v=>S("typ",v)}/></div>

      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontFamily:"monospace"}}>Pisten &amp; Lifte</div>
        <RangeInput min={0} max={450} value={pistenR} onChange={v=>S("pistenR",v)} label="Pistenkilometer" unit=" km"/>
        <RangeInput min={0} max={90}  value={lifteR}  onChange={v=>S("lifteR",v)}  label="Anzahl Lifte"    unit=""/>
      </div>
      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontFamily:"monospace"}}>Höhen</div>
        <RangeInput min={400} max={3900} value={bergR} onChange={v=>S("bergR",v)} label="Bergstation" unit="m"/>
        <RangeInput min={400} max={2200} value={talR}  onChange={v=>S("talR",v)}  label="Talstation"  unit="m"/>
      </div>

      <div>
        <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7,fontFamily:"monospace"}}>Sortieren</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {[{k:"km",l:"Pisten"},{k:"lifte",l:"Lifte"},{k:"berg",l:"Berghöhe"},{k:"diff",l:"Höhendiff"},{k:"distance",l:"Entfernung"}].map(o=>(
            <button key={o.k} onClick={()=>{if(sortBy===o.k)S("sortDir",sortDir==="desc"?"asc":"desc");else{S("sortBy",o.k);S("sortDir",o.k==="distance"?"asc":"desc");}}}
              disabled={o.k==="distance"&&!userCoords}
              style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontFamily:"'DM Mono',monospace",cursor:o.k==="distance"&&!userCoords?"not-allowed":"pointer",border:"none",opacity:o.k==="distance"&&!userCoords?.4:1,background:sortBy===o.k?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)",color:sortBy===o.k?"#38bdf8":"#475569",outline:sortBy===o.k?"1px solid rgba(56,189,248,0.3)":"1px solid transparent"}}>
              {o.l}{sortBy===o.k?(sortDir==="desc"?"↓":"↑"):""}
            </button>
          ))}
        </div>
      </div>

      <div style={{fontSize:11,color:"#334155",fontFamily:"monospace",textAlign:"center"}}>{resultCount} Skigebiete</div>

      <button onClick={onReset} style={{marginTop:"auto",padding:"8px",width:"100%",borderRadius:9,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",color:"#475569",fontSize:11,cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"0.08em",textTransform:"uppercase"}}>
        Filter zurücksetzen
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════
function App(){
  const[tab,setTab]=useState("liste");
  const[st,setSt]=useState({
    search:"",region:"Alle",status:"Alle",typ:"Alle",mpF:"Im MagicPass",
    pistenR:[0,450],lifteR:[0,90],bergR:[400,3900],talR:[400,2200],
    sortBy:"km",sortDir:"desc",userInput:"",userCoords:null,
  });
  const set=(k,v)=>setSt(p=>({...p,[k]:v}));

  const[wx,setWx]=useState({});
  const[loading,setLoading]=useState(false);
  const[geo,setGeo]=useState(false);
  const[favs,setFavs]=useState(()=>{try{return JSON.parse(localStorage.getItem("mp_favs")||"[]")}catch{return[]}});
  const[drawer,setDrawer]=useState(false);

  useEffect(()=>{localStorage.setItem("mp_favs",JSON.stringify(favs));},[favs]);
  const toggleFav=useCallback(id=>setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id]),[]);

  // Geocoding
  const geocode=async()=>{
    const q=st.userInput.trim();
    if(!q)return;
    setGeo(true);
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{"Accept-Language":"de","User-Agent":"MagicPassDash/2.0"}});
      const d=await r.json();
      if(d&&d.length>0){
        const coords={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon),name:d[0].display_name.split(",")[0]};
        set("userCoords",coords);
        set("sortBy","distance");
        set("sortDir","asc");
      } else {
        alert(`"${q}" nicht gefunden. Bitte eine andere Schreibweise versuchen.`);
      }
    }catch{alert("Verbindungsfehler. Bitte Internet prüfen.");}
    setGeo(false);
  };

  // Distanzen
  const dists=useMemo(()=>{
    if(!st.userCoords)return null;
    const d={};
    STATIONS.forEach(s=>{d[s.id]=haversine(st.userCoords.lat,st.userCoords.lng,s.lat,s.lng);});
    return d;
  },[st.userCoords]);

  // Wetter laden — alle Stationen in Batches
  const fetchWx=useCallback(async(list)=>{
    if(loading)return;
    setLoading(true);
    const newW={};
    const chunks=[];
    for(let i=0;i<list.length;i+=8)chunks.push(list.slice(i,i+8));
    for(const chunk of chunks){
      await Promise.all(chunk.map(async s=>{
        try{
          const url=`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current=temperature_2m,weather_code,wind_speed_10m,snow_depth&wind_speed_unit=kmh&timezone=Europe%2FBerlin`;
          const r=await fetch(url);
          const d=await r.json();
          if(d.current){newW[s.id]={temp:Math.round(d.current.temperature_2m),code:d.current.weather_code,wind:Math.round(d.current.wind_speed_10m),snow:Math.round((d.current.snow_depth||0)*100)};}
        }catch{/*skip*/}
      }));
      // kleine Pause zwischen Batches für Rate-Limit
      await new Promise(r=>setTimeout(r,200));
    }
    setWx(w=>({...w,...newW}));
    setLoading(false);
  },[loading]);

  // Beim Start: alle Stationen laden
  useEffect(()=>{fetchWx(STATIONS);},[]);

  // Filter + Sort
  const filtered=useMemo(()=>{
    const{search,region,status,typ,mpF,pistenR,lifteR,bergR,talR,sortBy,sortDir}=st;
    let r=STATIONS.filter(s=>{
      if(search&&!s.name.toLowerCase().includes(search.toLowerCase()))return false;
      if(region!=="Alle"&&s.region!==region)return false;
      if(status!=="Alle"&&s.status!==status)return false;
      if(typ!=="Alle"&&s.typ!==typ)return false;
      if(mpF==="Im MagicPass"&&!s.mp)return false;
      if(mpF==="Nicht im MagicPass"&&s.mp)return false;
      if(s.km<pistenR[0]||s.km>pistenR[1])return false;
      if(s.lifte<lifteR[0]||s.lifte>lifteR[1])return false;
      if(s.berg<bergR[0]||s.berg>bergR[1])return false;
      if(s.tal<talR[0]||s.tal>talR[1])return false;
      return true;
    });
    return[...r].sort((a,b)=>{
      if(sortBy==="distance"&&dists)return sortDir==="asc"?(dists[a.id]||9999)-(dists[b.id]||9999):(dists[b.id]||9999)-(dists[a.id]||9999);
      return sortDir==="desc"?b[sortBy]-a[sortBy]:a[sortBy]-b[sortBy];
    });
  },[st,dists]);

  const favStations=useMemo(()=>STATIONS.filter(s=>favs.includes(s.id)),[favs]);
  const openCount=filtered.filter(s=>s.status==="offen").length;
  const mpCount=filtered.filter(s=>s.mp).length;
  const totalKm=filtered.reduce((a,s)=>a+s.kmO,0);

  const resetAll=()=>setSt(p=>({...p,search:"",region:"Alle",status:"Alle",typ:"Alle",mpF:"Im MagicPass",pistenR:[0,450],lifteR:[0,90],bergR:[400,3900],talR:[400,2200]}));

  const TABS=[{k:"liste",i:"☰",l:"Liste"},{k:"karte",i:"🗺",l:"Karte"},{k:"favoriten",i:"⭐",l:`Favoriten (${favs.length})`}];

  const sidebarEl=<Sidebar state={st} set={set} onReset={resetAll} onGeo={geocode} geo={geo} resultCount={filtered.length}/>;

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#060d1a",fontFamily:"'Syne',sans-serif",color:"#f1f5f9",overflow:"hidden"}}>
      {/* TOP BAR */}
      <div style={{flexShrink:0,background:"rgba(13,27,42,0.97)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",padding:"0 16px",height:50,gap:12,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{fontSize:18}}>⛷</div>
          <div style={{fontSize:13,fontWeight:800}}>MagicPass</div>
        </div>
        <div style={{display:"flex",flex:1,gap:0}}>
          {TABS.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} className={`tab-btn${tab===t.k?" active":""}`} style={{padding:"0 12px",height:50,background:"none",border:"none",color:tab===t.k?"#f1f5f9":"#475569",cursor:"pointer",fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:tab===t.k?700:400,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
              <span>{t.i}</span>
              <span className="tab-label-full">{t.l}</span>
              <span className="tab-label-short">{t.k==="favoriten"?`⭐${favs.length}`:t.i}</span>
            </button>
          ))}
        </div>
        {loading&&<div style={{fontSize:10,color:"#38bdf8",fontFamily:"monospace",flexShrink:0}}>🌤 Wetter…</div>}
        <button onClick={()=>setDrawer(o=>!o)} className="mobile-only" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>⚙</button>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Desktop Sidebar */}
        <div className="sidebar-desktop" style={{width:285,flexShrink:0,background:"rgba(10,20,35,0.98)",borderRight:"1px solid rgba(255,255,255,0.05)",padding:"20px 16px",overflowY:"auto"}}>
          {sidebarEl}
        </div>

        {/* Mobile Drawer */}
        {drawer&&(
          <div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setDrawer(false)}>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(4px)"}}/>
            <div style={{position:"absolute",left:0,top:0,bottom:0,width:300,background:"rgba(10,20,35,0.99)",padding:"20px 16px",overflowY:"auto",zIndex:1}} onClick={e=>e.stopPropagation()}>
              <button onClick={()=>setDrawer(false)} style={{position:"absolute",top:12,right:12,background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:18}}>✕</button>
              {sidebarEl}
            </div>
          </div>
        )}

        {/* Content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* LISTE */}
          {tab==="liste"&&(
            <div style={{flex:1,overflowY:"auto",padding:"18px 16px"}}>
              <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
                <Pill label="Stationen" value={filtered.length}/>
                <Pill label="Offen" value={openCount}/>
                <Pill label="✦ MagicPass" value={mpCount} accent="#a5b4fc"/>
                <Pill label="Offene km" value={`${totalKm}`}/>
                <Pill label="Wetter" value={`${Object.keys(wx).length}/${STATIONS.length}`}/>
              </div>
              {filtered.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"#334155"}}>
                  <div style={{fontSize:40,marginBottom:12}}>🏔</div>
                  <div style={{fontWeight:600,fontSize:15}}>Keine Skigebiete gefunden</div>
                  <div style={{fontSize:13,marginTop:6}}>Filter anpassen</div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:14}}>
                  {filtered.map(s=>(
                    <SkiCard key={s.id} s={s} dist={dists?.[s.id]??null} wx={wx[s.id]} isFav={favs.includes(s.id)} onFav={toggleFav}/>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* KARTE */}
          {tab==="karte"&&(
            <div style={{flex:1,overflow:"hidden"}}>
              <MapView stations={filtered} userCoords={st.userCoords} favorites={favs} onFav={toggleFav} wx={wx} dists={dists}/>
            </div>
          )}

          {/* FAVORITEN */}
          {tab==="favoriten"&&(
            <div style={{flex:1,overflowY:"auto",padding:"18px 16px"}}>
              {favStations.length===0?(
                <div style={{textAlign:"center",padding:"80px 20px",color:"#334155"}}>
                  <div style={{fontSize:48,marginBottom:14}}>⭐</div>
                  <div style={{fontWeight:700,fontSize:16}}>Noch keine Favoriten</div>
                  <div style={{fontSize:13,marginTop:8,color:"#475569"}}>Klicke auf ⭐ auf einer Karte oder im Karten-Popup um Skigebiete zu speichern.</div>
                </div>
              ):(
                <>
                  <div style={{marginBottom:16,fontSize:12,color:"#475569",fontFamily:"monospace"}}>{favStations.length} gespeicherte Skigebiete</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(285px,1fr))",gap:14}}>
                    {favStations.map(s=>(
                      <SkiCard key={s.id} s={s} dist={dists?.[s.id]??null} wx={wx[s.id]} isFav={true} onFav={toggleFav}/>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
